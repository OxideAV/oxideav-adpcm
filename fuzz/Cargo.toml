[package]
name = "oxideav-adpcm-fuzz"
version = "0.0.0"
publish = false
edition = "2021"

[package.metadata]
cargo-fuzz = true

# In-tree `tests/decoder_fuzz.rs` already drives every variant through a
# deterministic in-process LCG + the trait-level `Decoder::send_packet`
# / `receive_frame` path. That harness is fast (it runs in `cargo
# test`), reproducible, and catches structural malformation classes
# enumerated by hand (truncated prefixes, out-of-spec predictor
# bytes, body-misalignment, ‚Ä¶).
#
# What it does NOT do is coverage-guided exploration of the nibble
# stream and block-header product space. This libfuzzer harness fills
# that other half ‚Äî one decode-side target + one encode-side target
# per variant family:
#
# Decode side (per-variant `decode_block` / `decode_packet`):
# - `decode_packet_ms`  ‚Äî every block size + header + body byte triple
#   the MS-ADPCM decoder accepts.
# - `decode_packet_ima_wav` ‚Äî same for the IMA-ADPCM WAV variant
#   (`oxideav_adpcm::ima_wav::decode_block`).
# - `decode_packet_ima_qt` ‚Äî the fixed 34-byte/channel Apple
#   QuickTime variant.
# - `decode_packet_stream` ‚Äî Yamaha-A / Yamaha-B / Dialogic-VOX
#   stream-oriented decoders fed against a fuzz-derived nibble
#   stream + state seed.
#
# Encode side (per-variant `encode_block` / `encode_packet` ‚Äî added
# round 229 to mirror the decode-side coverage):
# - `encode_packet_ms` ‚Äî every PCM input √ó block-size pair the
#   MS-ADPCM block encoder accepts (`encoder::encode_block`).
# - `encode_packet_ima_wav` ‚Äî same for IMA-ADPCM-WAV
#   (`encoder::ima_encode_block`); 1..=8 channels.
# - `encode_packet_ima_qt` ‚Äî fixed 64-samples-per-channel QT block
#   encoder (`encoder::ima_qt_encode_block`), exercising the mean-|Œî|
#   step-index heuristic on adversarial PCM.
# - `encode_packet_stream` ‚Äî Yamaha-A / Yamaha-B / Dialogic-VOX
#   stream-oriented encoders driven against a fuzz-derived PCM stream
#   + state seed (both nibble orders for Dialogic, both 12-bit
#   widenings for ADPCM-A).
#
# Targets are independent so cargo-fuzz can prioritise corpus per
# variant. None of them touches the registry path ‚Äî every entry
# point is the per-variant `decode_packet` / `decode_block` (or
# `encode_packet` / `encode_block`) helper already covered by the
# in-tree fuzz harness, so a crash here is a structural bug in the
# per-variant codec, not in the registry-routing glue.
[dependencies]
libfuzzer-sys = "0.4"

[dependencies.oxideav-adpcm]
path = ".."

# Prevent the cargo-fuzz crate from being pulled into the umbrella
# workspace; libfuzzer-sys needs nightly + has its own deps that
# don't belong in the umbrella resolve graph.
[workspace]
members = ["."]

[profile.release]
debug = 1

[[bin]]
name = "decode_packet_ms"
path = "fuzz_targets/decode_packet_ms.rs"
test = false
doc = false

[[bin]]
name = "decode_packet_ima_wav"
path = "fuzz_targets/decode_packet_ima_wav.rs"
test = false
doc = false

[[bin]]
name = "decode_packet_ima_qt"
path = "fuzz_targets/decode_packet_ima_qt.rs"
test = false
doc = false

[[bin]]
name = "decode_packet_stream"
path = "fuzz_targets/decode_packet_stream.rs"
test = false
doc = false

[[bin]]
name = "encode_packet_ms"
path = "fuzz_targets/encode_packet_ms.rs"
test = false
doc = false

[[bin]]
name = "encode_packet_ima_wav"
path = "fuzz_targets/encode_packet_ima_wav.rs"
test = false
doc = false

[[bin]]
name = "encode_packet_ima_qt"
path = "fuzz_targets/encode_packet_ima_qt.rs"
test = false
doc = false

[[bin]]
name = "encode_packet_stream"
path = "fuzz_targets/encode_packet_stream.rs"
test = false
doc = false
